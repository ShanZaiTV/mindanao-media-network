<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
    overflow:hidden;
}

/* HEADER */

header{
    height:75px;
    background:#111827;
    display:flex;
    align-items:center;
    padding:0 20px;
    border-bottom:3px solid #38bdf8;
}

.main-logo{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
    margin-right:15px;
    background:white;
}

.title-box{
    display:flex;
    flex-direction:column;
}

.title{
    font-size:28px;
    font-weight:bold;
    color:#38bdf8;
}

.subtitle{
    font-size:13px;
    color:#cbd5e1;
}

/* MAIN LAYOUT */

.container{
    display:flex;
    height:calc(100vh - 75px);
}

/* PLAYLIST */

.playlist{
    width:360px;
    background:#111827;
    overflow-y:auto;
    border-right:2px solid #1e293b;
}

.playlist-header{
    padding:15px;
    text-align:center;
    background:#1e293b;
    font-size:22px;
    font-weight:bold;
    color:#facc15;
}

/* CHANNEL ITEM */

.channel{
    display:flex;
    align-items:center;
    gap:12px;
    padding:15px;
    border-bottom:1px solid #1e293b;
    cursor:pointer;
    transition:0.3s;
}

.channel:hover{
    background:#2563eb;
}

/* CHANNEL NUMBER */

.channel-number{
    width:45px;
    height:45px;
    border-radius:50%;
    background:#38bdf8;
    color:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    font-weight:bold;
}

/* CHANNEL LOGO */

.channel-logo{
    width:60px;
    height:60px;
    border-radius:10px;
    object-fit:cover;
    background:white;
}

/* CHANNEL INFO */

.channel-info{
    flex:1;
}

.channel-name{
    font-size:18px;
    font-weight:bold;
}

.channel-label{
    margin-top:5px;
    font-size:13px;
    color:#cbd5e1;
}

/* PLAYER */

.player{
    flex:1;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

video{
    width:96%;
    height:92%;
    border-radius:12px;
    background:black;
}

/* LIVE LABEL */

.live{
    position:absolute;
    top:20px;
    left:20px;
    background:red;
    padding:8px 16px;
    border-radius:20px;
    font-size:14px;
    font-weight:bold;
    z-index:10;
}

/* FOOTER */

.footer{
    position:absolute;
    bottom:15px;
    right:20px;
    background:rgba(0,0,0,0.6);
    padding:8px 14px;
    border-radius:20px;
    font-size:13px;
    color:#fff;
}

</style>
</head>

<!-- HLS JS -->

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video = document.getElementById('video');
const liveText = document.getElementById('liveText');

function playChannel(url, name){

    liveText.innerHTML = "LIVE • " + name;

    if(Hls.isSupported()){

        if(window.hls){
            window.hls.destroy();
        }

        const hls = new Hls();
        window.hls = hls;

        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function(){
            video.play();
        });

    }else if(video.canPlayType('application/vnd.apple.mpegurl')){

        video.src = url;

        video.addEventListener('loadedmetadata', function(){
            video.play();
        });

    }else{
        alert("HLS is not supported on this browser.");
    }
}

/* AUTO PLAY FIRST CHANNEL */

</script>
